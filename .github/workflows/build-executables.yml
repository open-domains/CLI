name: Build Executables

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            artifact: opendomains-linux-x64
          - name: windows-x64
            os: windows-latest
            artifact: opendomains-windows-x64.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Bundle CLI
        run: npm run build:bundle

      - name: Generate SEA blob
        run: node --experimental-sea-config sea-config.json

      - name: Copy Node runtime
        if: runner.os != 'Windows'
        run: |
          cp "$(command -v node)" "dist/${{ matrix.artifact }}"
          chmod +x "dist/${{ matrix.artifact }}"

      - name: Copy Node runtime
        if: runner.os == 'Windows'
        run: Copy-Item (node -p "process.execPath") "dist/${{ matrix.artifact }}"

      - name: Inject CLI blob
        run: npx --yes postject@1.0.0-alpha.6 "dist/${{ matrix.artifact }}" NODE_SEA_BLOB dist/opendomains.blob --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

      - name: Smoke test executable
        if: runner.os != 'Windows'
        run: ./dist/${{ matrix.artifact }} --version

      - name: Smoke test executable
        if: runner.os == 'Windows'
        run: '& ".\dist\${{ matrix.artifact }}" --version'

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download executables
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload executables to VirusTotal
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${VIRUSTOTAL_API_KEY}" ]; then
            echo "Missing VIRUSTOTAL_API_KEY repository secret." >&2
            exit 1
          fi

          report="dist/VIRUSTOTAL.md"
          {
            echo "# VirusTotal Scan Report"
            echo
            echo "Release: ${GITHUB_REF_NAME}"
            echo "Generated: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo
          } > "$report"

          for file in dist/opendomains-*; do
            [ -f "$file" ] || continue
            filename="$(basename "$file")"
            size="$(stat -c%s "$file")"
            upload_url="https://www.virustotal.com/api/v3/files"

            if [ "$size" -gt 33554432 ]; then
              upload_url="$(curl --fail --silent --show-error \
                --header "x-apikey: ${VIRUSTOTAL_API_KEY}" \
                "https://www.virustotal.com/api/v3/files/upload_url" | jq -r '.data')"
            fi

            response="$(curl --fail --silent --show-error \
              --request POST \
              --url "$upload_url" \
              --header "x-apikey: ${VIRUSTOTAL_API_KEY}" \
              --form "file=@${file}")"

            analysis_id="$(jq -r '.data.id' <<< "$response")"
            analysis_url="https://www.virustotal.com/gui/file-analysis/${analysis_id}"

            echo "Uploaded ${filename} to VirusTotal: ${analysis_url}"
            {
              echo "## ${filename}"
              echo
              echo "- Size: ${size} bytes"
              echo "- Analysis ID: \`${analysis_id}\`"
              echo "- Analysis URL: ${analysis_url}"
            } >> "$report"

            status="queued"
            stats="{}"
            for _ in $(seq 1 10); do
              sleep 30
              analysis="$(curl --fail --silent --show-error \
                --header "x-apikey: ${VIRUSTOTAL_API_KEY}" \
                "https://www.virustotal.com/api/v3/analyses/${analysis_id}")"
              status="$(jq -r '.data.attributes.status // "unknown"' <<< "$analysis")"
              stats="$(jq -c '.data.attributes.stats // {}' <<< "$analysis")"
              [ "$status" = "completed" ] && break
            done

            {
              echo "- Status: ${status}"
              echo "- Stats: \`${stats}\`"
              echo
            } >> "$report"
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum opendomains-* > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/opendomains-*
            dist/SHA256SUMS.txt
            dist/VIRUSTOTAL.md
