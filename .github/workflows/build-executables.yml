name: Build Executables

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            artifact: opendomains-linux-x64
          - name: windows-x64
            os: windows-latest
            artifact: opendomains-windows-x64.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Bundle CLI
        run: npm run build:bundle

      - name: Generate SEA blob
        run: node --experimental-sea-config sea-config.json

      - name: Copy Node runtime
        if: runner.os != 'Windows'
        run: |
          cp "$(command -v node)" "dist/${{ matrix.artifact }}"
          chmod +x "dist/${{ matrix.artifact }}"

      - name: Copy Node runtime
        if: runner.os == 'Windows'
        run: Copy-Item (node -p "process.execPath") "dist/${{ matrix.artifact }}"

      - name: Inject CLI blob
        run: npx --yes postject@1.0.0-alpha.6 "dist/${{ matrix.artifact }}" NODE_SEA_BLOB dist/opendomains.blob --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

      - name: Smoke test executable
        if: runner.os != 'Windows'
        run: ./dist/${{ matrix.artifact }} --version

      - name: Smoke test executable
        if: runner.os == 'Windows'
        run: '& ".\dist\${{ matrix.artifact }}" --version'

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download executables
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum opendomains-* > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/opendomains-*
            dist/SHA256SUMS.txt
